# ========================================
# CONFIGURACIÓN DE BASE DE DATOS - MySQL
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/consultorio_medico?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# CONFIGURACIÓN DE JPA/HIBERNATE
# ========================================
# Estrategia de generación de tablas (update = actualiza sin borrar datos)
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola (útil para desarrollo)
spring.jpa.show-sql=true

# Formatear SQL para mejor legibilidad
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de timezone para Hibernate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ========================================
# CONFIGURACIÓN DE LOGGING
# ========================================
# Nivel de log para SQL y parámetros
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# CONFIGURACIÓN DE SERVIDOR
# ========================================
server.port=8080

# Configuración de contexto (opcional)
# server.servlet.context-path=/api

# ========================================
# CONFIGURACIÓN DE SEGURIDAD
# ========================================
# Clave generada para firma de tokens (HMAC-SHA256 compatible)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiración: 24 horas (en milisegundos)
jwt.expiration=86400000

# CORS (Development defaults)
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:5173

# ========================================
# CONFIGURACIÓN DE JACKSON (JSON)
# ========================================
# Formato de fechas en JSON
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ========================================
# CONFIGURACIÓN DE BACKUPS
# ========================================
# Ajustar según la instalación de MySQL del usuario (Community Server suele ser este path)
backup.mysqldump-path=C:/Program Files/MySQL/MySQL Server 8.0/bin/mysqldump.exe
backup.output-dir=./backups

# ========================================
# CONFIGURACIÓN DE CORREO (SMTP)
# ========================================
# Email al que se enviarán los backups
backup.email.to=feliprono2001@gmail.com

# Credenciales del emisor (ej: Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
