# ========================================
# CONFIGURACIÓN DE BASE DE DATOS - PROD
# ========================================
# Las variables ${...} deben ser definidas en el servidor
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# CONFIGURACIÓN DE JPA/HIBERNATE
# ========================================
# En producción, solo validar el esquema, nunca actualizarlo automáticamente
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ========================================
# CONFIGURACIÓN DE SEGURIDAD
# ========================================
# El secreto debe ser una variable de entorno larga y segura
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ========================================
# CONFIGURACIÓN CORS
# ========================================
# URLs permitidas separadas por comas (ej: https://mi-dominio.com)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
